---

- hosts: all
  become: true
  
  tasks:
    
    - name: adding user in the servers
      tags: adduser
      ansible.builtin.user:
        name: Kirtan
        shell: /bin/bash
        create_home: true
        state: present
    
    - name: adding the .ssh folder in the user dir
      tags: adduser, ssh
      file:
        path: /home/Kirtan/.ssh
        state: directory
        mode: '0700'
        owner: Kirtan
        group: Kirtan

    - name: adding the ssh public key in the .ssh
      tags: ssh,key,adduser
      ansible.posix.authorized_key:
        user: Kirtan
        state: present
        key: "ssh-rsa  kirtan-key"
     
       
